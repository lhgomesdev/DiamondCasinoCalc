<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Casino Heist - Setup Board</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        oswald: ['Oswald', 'sans-serif'],
                        roboto: ['Roboto Condensed', 'sans-serif'],
                    },
                    colors: {
                        'gta-gold': '#F0C850',
                        'gta-green': '#4DFF4D',
                        'gta-red': '#FF4D4D',
                        'gta-bg': 'rgba(10, 10, 10, 0.85)',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/calc.js"></script>
    <script src="js/ui.js"></script>

    <link rel="icon" type="image/png" sizes="32x32" href="css/favicon-32x32.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

</head>
<body class="min-h-screen p-4 sm:p-8 flex justify-center">

<div class="w-full max-w-7xl relative z-10">

    <header class="mb-10 border-b-4 border-gta-gold pb-4 flex justify-between items-end">
        <div>
            <p class="text-gta-gold text-sm font-bold tracking-widest mb-1">PLANO DE AÇÃO SECUROSERV</p>
            <h1 class="font-gta-heading text-4xl sm:text-5xl font-bold tracking-wider text-white">
                DIAMOND CASINO <span class="text-gray-400">HEIST</span>
            </h1>
        </div>
        <i class="fas fa-gem text-gta-gold text-5xl opacity-80"></i>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <section class="gta-panel p-6 flex flex-col">
            <h2 class="font-gta-heading text-xl text-white bg-black/50 border-l-4 border-gta-gold p-2 mb-6">
                <i class="fas fa-crosshairs text-gta-gold mr-2"></i> DETALHES DO ALVO
            </h2>

            <div id="target-options" class="grid grid-cols-2 gap-2 mb-6"></div>

            <div class="space-y-3 mb-8">
                <button id="btn-hard" onclick="ui.toggleMode('isHard', 'btn-hard')" class="w-full py-3 px-4 border-2 border-gta-red bg-gta-red text-black font-bold text-left flex justify-between items-center transition-none">
                    <span><i class="fas fa-skull mr-2"></i> MODO DIFÍCIL</span>
                    <i class="checkbox-icon fas fa-check-square"></i>
                </button>

                <button id="btn-elite" onclick="ui.toggleMode('isElite', 'btn-elite')" class="w-full py-3 px-4 border-2 border-white/20 bg-black/50 text-gray-400 font-bold text-left hover:bg-white hover:text-black flex justify-between items-center transition-none">
                    <span><i class="fas fa-stopwatch mr-2"></i> DESAFIO DE ELITE</span>
                    <i class="checkbox-icon far fa-square"></i>
                </button>

                <button id="btn-event" onclick="ui.toggleMode('isEvent', 'btn-event')" class="w-full py-3 px-4 border-2 border-white/20 bg-black/50 text-gray-400 font-bold text-left hover:bg-white hover:text-black flex justify-between items-center transition-none">
                    <span><i class="fas fa-star mr-2"></i> EVENTO 2X GTA$</span>
                    <i class="checkbox-icon far fa-square"></i>
                </button>
            </div>

            <div>
                <h3 class="text-sm text-gray-400 font-bold mb-2"><i class="fas fa-user-tie mr-1"></i> NÍVEL DO COMPRADOR</h3>
                <div class="flex gap-2">
                    <button onclick="ui.setBuyer('low')" data-level="low" class="buyer-btn flex-1 py-2 px-1 border-2 border-white/20 bg-black/50 text-gray-400 font-bold hover:bg-white hover:text-black text-xs text-center transition-none">
                        BAIXO<br><span class="text-[10px]">-10% LAVAGEM</span>
                    </button>
                    <button onclick="ui.setBuyer('mid')" data-level="mid" class="buyer-btn flex-1 py-2 px-1 border-2 border-white/20 bg-black/50 text-gray-400 font-bold hover:bg-white hover:text-black text-xs text-center transition-none">
                        MÉDIO<br><span class="text-[10px]">-5% LAVAGEM</span>
                    </button>
                    <button onclick="ui.setBuyer('high')" data-level="high" class="buyer-btn flex-1 py-2 px-1 border-2 border-gta-gold bg-gta-gold text-black font-bold text-xs text-center transition-none">
                        ALTO<br><span class="text-[10px]">0% LAVAGEM</span>
                    </button>
                </div>
            </div>
        </section>

        <section class="gta-panel p-6">
            <h2 class="font-gta-heading text-xl text-white bg-black/50 border-l-4 border-gta-gold p-2 mb-6">
                <i class="fas fa-users text-gta-gold mr-2"></i> EQUIPE DE APOIO
            </h2>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-gta-gold font-bold mb-2">HACKER (TEMPO NO COFRE)</label>
                    <div class="relative">
                        <select id="hacker-select" aria-label="Selecione o Hacker" class="w-full bg-black/80 text-white border-2 border-white/20 p-3 font-bold uppercase focus:border-gta-gold outline-none cursor-pointer hover:bg-white/10"></select>
                        <i class="fas fa-caret-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                    </div>
                    <div class="mt-3 bg-black/40 border border-white/10 p-3">
                        <ul id="hacker-legend-list" class="space-y-1 text-xs text-gray-400"></ul>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 font-bold mb-2">ATIRADOR (ARMAS)</label>
                    <div class="relative">
                        <select id="gunman-select" aria-label="Selecione o Atirador" class="w-full bg-black/80 text-white border-2 border-white/20 p-3 font-bold uppercase focus:border-gta-gold outline-none cursor-pointer hover:bg-white/10"></select>
                        <i class="fas fa-caret-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-400 font-bold mb-2">PILOTO (VEÍCULOS DE FUGA)</label>
                    <div class="relative">
                        <select id="driver-select" aria-label="Selecione o Piloto" class="w-full bg-black/80 text-white border-2 border-white/20 p-3 font-bold uppercase focus:border-gta-gold outline-none cursor-pointer hover:bg-white/10"></select>
                        <i class="fas fa-caret-down absolute right-4 top-4 text-gray-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>
        </section>

        <section class="gta-panel p-6 flex flex-col bg-[#080808]">
            <h2 class="font-gta-heading text-xl text-white bg-black/50 border-l-4 border-gta-gold p-2 mb-6">
                <i class="fas fa-file-invoice-dollar text-gta-gold mr-2"></i> DIVISÃO FINAL
            </h2>

            <div class="flex gap-2 mb-6">
                <span class="text-sm text-gray-400 font-bold flex-grow self-center">JOGADORES:</span>
                <button onclick="ui.setPlayers(2)" data-count="2" class="p-btn w-10 h-10 border-2 border-gta-gold bg-gta-gold text-black font-gta-heading font-bold text-xl transition-none">2</button>
                <button onclick="ui.setPlayers(3)" data-count="3" class="p-btn w-10 h-10 border-2 border-white/20 bg-black/50 text-gray-400 font-gta-heading font-bold text-xl hover:bg-white hover:text-black transition-none">3</button>
                <button onclick="ui.setPlayers(4)" data-count="4" class="p-btn w-10 h-10 border-2 border-white/20 bg-black/50 text-gray-400 font-gta-heading font-bold text-xl hover:bg-white hover:text-black transition-none">4</button>
            </div>

            <div id="players-container" class="space-y-4 mb-6"></div>

            <div class="text-right text-sm font-bold mb-4 font-gta-heading text-xl tracking-wider">
                SOMA TOTAL: <span id="total-split-display" class="text-gta-green">100%</span>
            </div>

            <div class="mt-auto bg-[#111] border border-white/10 p-4">
                <div class="space-y-2 text-sm font-gta-heading text-lg">
                    <div class="flex justify-between text-gray-400">
                        <span>POTENCIAL MÁXIMO <span id="event-badge" class="hidden text-black bg-gta-gold text-[10px] font-bold px-1 ml-1 align-middle">2X</span></span>
                        <span id="val-gross" class="text-white">$ 0</span>
                    </div>
                    <div class="flex justify-between text-gta-red">
                        <span>TAXA DE LAVAGEM</span>
                        <span id="val-buyer-fee">- $ 0</span>
                    </div>
                    <div class="flex justify-between text-gta-red">
                        <span>LESTER + EQUIPE</span>
                        <span id="val-deductions">- $ 0</span>
                    </div>
                    <div class="flex justify-between text-[#4da6ff]">
                        <span>DESAFIO DE ELITE</span>
                        <span id="val-elite">+ $ 0</span>
                    </div>
                </div>

                <div class="border-t border-white/20 my-4"></div>

                <div id="final-payouts-list" class="space-y-2 font-gta-heading text-xl tracking-wide"></div>
            </div>
        </section>
    </div>

</div>
</body>
</html>
